<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremy J Parmenter</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
      }
    </style>
    <style>
      
      @media(prefers-color-scheme: dark) {
        body{
          background-color: #161616;
          text-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
          color: #fff;
        }
        h1{
          color: #fff;
        }
        a{
          color: #488ce8;
        }
        .cta svg{
          fill: #488ce8;
        }
        p{
          color: #c1c1c1;
        }
        i{
          color: #646464;
        }
      }
      
      @media(prefers-color-scheme: light) {
        body{
          background-color: #f7f7f7;
          text-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
          color: #333;
        }
        h1{
        color: #333;
        }
        a{
          color: #2e6cc1;
        }
        .cta svg{
          fill: #2e6cc1;
        }
        p{
          color: #666;
        }
        i{
          color: #999;
        }
      }
      body {
        padding: 32px;
        -webkit-user-select: none;
        user-select: none;
        cursor: default;
      }

      section{
        margin-bottom: 16px;
      }
      .cta{
        margin-bottom: 16px;
        display: block;
      }
      .bg{
        position: fixed;
        width: 100%;
        height: 100%;
        left: 0;
        top: 0;
        z-index: -1;
      }
    </style>
    <script type="module">
      import ArtsyCanvasBackground from './artsy_canvas_background.js';
    </script>
  </head>
  <body>
    <div class="info">
      <h1>JeremyJaydan</h1>
      <p>Freelance web developer and designer from Perth, Australia.</p>
      <section>
        <a class="cta" href="https://github.com/JeremyJaydan" target="_blank" rel="noopener">
          <span>GitHub.com/JeremyJaydan</span>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#000000" viewBox="0 0 256 256"><path d="M224,104a8,8,0,0,1-16,0V59.32l-66.33,66.34a8,8,0,0,1-11.32-11.32L196.68,48H152a8,8,0,0,1,0-16h64a8,8,0,0,1,8,8Zm-40,24a8,8,0,0,0-8,8v72H48V80h72a8,8,0,0,0,0-16H48A16,16,0,0,0,32,80V208a16,16,0,0,0,16,16H176a16,16,0,0,0,16-16V136A8,8,0,0,0,184,128Z"></path></svg>
        </a>
      </section>
      <i>a blog could be here soon..</i>
    </div>
    <artsy-canvas-background class="bg"></artsy-canvas-background>
